  const MRI_PAGE_SIZE = 4;

  function mriNavPrev() {
    if (window.mriPage > 0) { window.mriPage--; renderMriPageGrid(); }
  }
  function mriNavNext() {
    if ((window.mriPage + 1) * MRI_PAGE_SIZE < (window.mriActiveSeries || []).length) {
      window.mriPage++; renderMriPageGrid();
    }
  }
  function renderMriPageGrid() {
    const grid = document.getElementById('mriGrid');
    if (!grid) return;
    const series = window.mriActiveSeries || [];
    const start = window.mriPage * MRI_PAGE_SIZE;
    const page = series.slice(start, start + MRI_PAGE_SIZE);
    const count = page.length;
    grid.style.gridTemplateColumns = count >= 2 ? '1fr 1fr' : '1fr';
    grid.style.gridTemplateRows = count >= 3 ? '1fr 1fr' : '1fr';
    grid.innerHTML = page.map(ser => {
      const mid = ser.middleIndex;
      return `<div class="mri-series-column">
        <div class="mri-series-label">
          <span class="mri-series-label-text">${escHtml(ser.seriesLabel)}</span>
          <span class="mri-slice-counter">${mid + 1}/${ser.images.length}</span>
        </div>
        <div class="mri-stack-frame">
          <img class="mri-stack-img" src="${escHtml(ser.images[mid].url)}" alt="${mid + 1}" loading="lazy">
        </div>
      </div>`;
    }).join('');
    mriLinkGroups['mriGrid'] = [];
    grid.querySelectorAll('.mri-series-column').forEach((colEl, i) => {
      setupMriColumn(colEl, page[i].images, page[i].scrollToIndex ?? page[i].middleIndex, window.mriActiveSeries, 'mriGrid');
    });
    triggerInitialReferenceLines('mriGrid');
    const prevBtn = document.getElementById('mriNavPrev');
    const nextBtn = document.getElementById('mriNavNext');
    if (prevBtn) prevBtn.disabled = window.mriPage === 0;
    if (nextBtn) nextBtn.disabled = start + MRI_PAGE_SIZE >= series.length;
  }

  function triggerInitialReferenceLines(groupId) {
    const group = mriLinkGroups[groupId];
    if (!group || group.length === 0) return;
    group.forEach(reg => reg.triggerUpdate && reg.triggerUpdate());
  }

  function swapSeriesInColumn(colEl, newSeries, seriesList, linkGroupId) {
    const mid = newSeries.scrollToIndex ?? newSeries.middleIndex;
    colEl.innerHTML = `<div class="mri-series-label">
        <span class="mri-series-label-text">${escHtml(newSeries.seriesLabel)}</span>
        <span class="mri-slice-counter">${mid + 1}/${newSeries.images.length}</span>
      </div>
      <div class="mri-stack-frame">
        <img class="mri-stack-img" src="${escHtml(newSeries.images[mid].url)}" alt="${mid + 1}" loading="lazy">
      </div>`;
    // Remove old registration (setupMriColumn will also do this via _mriCleanup, belt+suspenders)
    if (linkGroupId && mriLinkGroups[linkGroupId]) {
      mriLinkGroups[linkGroupId] = mriLinkGroups[linkGroupId].filter(r => r.colEl !== colEl);
    }
    setupMriColumn(colEl, newSeries.images, mid, seriesList, linkGroupId);
    triggerInitialReferenceLines(linkGroupId);
  }

  // ── Reference line geometry helpers ──

  function dot3(a, b) {
    return a[0]*b[0] + a[1]*b[1] + a[2]*b[2];
  }

  function cross3(a, b) {
    return [a[1]*b[2] - a[2]*b[1], a[2]*b[0] - a[0]*b[2], a[0]*b[1] - a[1]*b[0]];
  }

  // Given the current axial slice (axIpp, axIop) and the sagittal column's physicalExtent,
  // return { x1,y1, x2,y2 } in 0-1 proportional image coordinates for where the axial
  // plane intersects the sagittal image, or null if outside the visible area.
  function computeObliqueRefLine(axIpp, axIop, sagExtent) {
    const { iop: sagIop, ipp: sagIpp, rows: sagRows, cols: sagCols, ps: sagPs } = sagExtent;
    if (!sagIop || !sagIpp || !sagRows || !sagCols || !sagPs) return null;

    // Normal to the axial slice plane
    const n = cross3([axIop[0], axIop[1], axIop[2]], [axIop[3], axIop[4], axIop[5]]);
    const len = Math.sqrt(dot3(n, n));
    if (len < 1e-9) return null;
    n[0] /= len; n[1] /= len; n[2] /= len;

    // Line in sagittal pixel space: Ap*u_p + Bp*v_p + Cp = 0
    // where u_p = col/( cols-1 ), v_p = row/( rows-1 ), both in [0,1]
    const Ap = (sagCols - 1) * sagPs[1] * dot3(n, [sagIop[0], sagIop[1], sagIop[2]]);
    const Bp = (sagRows - 1) * sagPs[0] * dot3(n, [sagIop[3], sagIop[4], sagIop[5]]);
    const Cp = dot3(n, sagIpp) - dot3(n, axIpp);

    // Find intersections with all four image edges
    const EPS = 1e-9, TOL = 1e-4;
    const pts = [];
    function tryPt(u, v) {
      if (u >= -TOL && u <= 1+TOL && v >= -TOL && v <= 1+TOL) {
        const uc = Math.max(0, Math.min(1, u)), vc = Math.max(0, Math.min(1, v));
        if (!pts.some(p => Math.abs(p[0]-uc) + Math.abs(p[1]-vc) < 1e-6)) pts.push([uc, vc]);
      }
    }
    if (Math.abs(Bp) > EPS) { tryPt(0, -Cp/Bp); tryPt(1, -(Ap+Cp)/Bp); }
    if (Math.abs(Ap) > EPS) { tryPt(-Cp/Ap, 0); tryPt(-(Bp+Cp)/Ap, 1); }

    if (pts.length < 2) return null;
    return { x1: pts[0][0], y1: pts[0][1], x2: pts[1][0], y2: pts[1][1] };
  }

  function setupMriColumn(colEl, images, initialIndex, seriesList = null, linkGroupId = null) {
    // Clean up any previous setup on this element
    if (colEl._mriCleanup) colEl._mriCleanup();

    const imgEl     = colEl.querySelector('.mri-stack-img');
    const counterEl = colEl.querySelector('.mri-slice-counter');
    const labelEl   = colEl.querySelector('.mri-series-label');
    const labelTextEl = colEl.querySelector('.mri-series-label-text');
    const frameEl   = colEl.querySelector('.mri-stack-frame');
    let currentIdx  = Math.max(0, Math.min(initialIndex, images.length - 1));

    // Inject reference line overlay if not already present
    let overlayEl = frameEl ? frameEl.querySelector('.ref-line-overlay') : null;
    if (frameEl && !overlayEl) {
      overlayEl = document.createElement('div');
      overlayEl.className = 'ref-line-overlay';
      overlayEl.innerHTML = '<div class="ref-line-h"></div><div class="ref-line-v"></div>' +
        '<svg class="ref-line-svg" xmlns="http://www.w3.org/2000/svg">' +
        '<line class="ref-line-d" stroke="rgba(255,165,0,0.85)" stroke-width="1.5" ' +
        'vector-effect="non-scaling-stroke" display="none"/></svg>';
      frameEl.appendChild(overlayEl);
    }
    const refLineH = overlayEl ? overlayEl.querySelector('.ref-line-h') : null;
    const refLineV = overlayEl ? overlayEl.querySelector('.ref-line-v') : null;
    const refLineD = overlayEl ? overlayEl.querySelector('.ref-line-d') : null;

    // Resize the overlay to exactly match the rendered image content area.
    // This bypasses any uncertainty about object-fit:contain black-bar offsets:
    // once the overlay covers only the image pixels, top:X% / left:X% map directly
    // to row/column proportions with no correction needed.
    function updateOverlay() {
      if (!overlayEl || !imgEl || !frameEl) return;
      const fRect = frameEl.getBoundingClientRect();
      const iRect = imgEl.getBoundingClientRect();
      const iElW  = iRect.width  || 1;
      const iElH  = iRect.height || 1;
      const natW  = (imgEl.naturalWidth  > 0 ? imgEl.naturalWidth  : null) ?? refImgMeta?.cols ?? iElW;
      const natH  = (imgEl.naturalHeight > 0 ? imgEl.naturalHeight : null) ?? refImgMeta?.rows ?? iElH;
      const sc    = Math.min(iElW / natW, iElH / natH);
      const cW    = natW * sc;
      const cH    = natH * sc;
      const top   = (iRect.top  - fRect.top)  + (iElH - cH) / 2;
      const left  = (iRect.left - fRect.left) + (iElW - cW) / 2;
      Object.assign(overlayEl.style, {
        inset: 'unset', top: `${top}px`, left: `${left}px`,
        width: `${cW}px`, height: `${cH}px`,
      });
    }
    if (imgEl && imgEl.naturalWidth > 0) updateOverlay();
    if (imgEl) imgEl.addEventListener('load', updateOverlay);

    // Detect orientation from label text
    const labelText = labelTextEl ? labelTextEl.textContent : '';
    const isSag = /\bsag\b/i.test(labelText);
    const isAx  = /\bax/i.test(labelText);

    // Compute physical image extent for accurate cross-reference line placement.
    // SAG: the line on SAG from an AX slice must land at the correct fraction of SAG's
    //      cranio-caudal extent, not just at a proportional position within the AX range.
    // AX:  similarly, the line on AX from a SAG plane must respect the AX image's L-R extent.
    let physicalExtent = null;
    const refImgMeta = images.find(i =>
      Array.isArray(i.imagePosition)    && i.imagePosition.length === 3 &&
      Array.isArray(i.imageOrientation) && i.imageOrientation.length === 6 &&
      i.rows != null &&
      Array.isArray(i.pixelSpacing)     && i.pixelSpacing.length >= 2
    );
    if (refImgMeta) {
      const iop = refImgMeta.imageOrientation;
      const ipp = refImgMeta.imagePosition;
      const ps  = refImgMeta.pixelSpacing;
      // Snap dominant direction cosines that may have been truncated by InteleBrowser
      // (e.g. '-0.9998...' stored as -0.9 → snap to -1).  Only affects |val| ≥ 0.85.
      const snap = v => (v != null && Math.abs(v) >= 0.85) ? Math.sign(v) : v;
      const rawIop  = iop.slice();   // unsnapped — needed for oblique plane math
      const rawIpp  = ipp.slice();
      const nRows   = refImgMeta.rows;
      const nCols   = refImgMeta.cols ?? refImgMeta.rows;
      if (isSag) {
        const cz      = snap(iop[5]);
        const z0      = ipp[2];
        const zExtent = (nRows - 1) * ps[0] * cz;
        if (Math.abs(zExtent) > 1)
          physicalExtent = { z0, zExtent, iop: rawIop, ipp: rawIpp, rows: nRows, cols: nCols, ps };
      } else if (isAx) {
        const rx      = snap(iop[0]);
        const x0      = ipp[0];
        const xExtent = (nCols - 1) * ps[1] * rx;
        if (Math.abs(xExtent) > 1)
          physicalExtent = { x0, xExtent, iop: rawIop, ipp: rawIpp, rows: nRows, cols: nCols, ps };
      }
    }

    // Register in link group
    const registration = {
      colEl, isSag, isAx, physicalExtent, jumpToZ: null,
      setReferenceLine(type, proportion) {
        // proportion=null → hide the line (slice outside coverage).
        // The overlay is sized to exactly the image content area by updateOverlay(),
        // so top/left percentages map directly to image row/column proportions.
        if (type === 'h') {
          if (refLineD) refLineD.setAttribute('display', 'none');
          if (!refLineH) return;
          if (proportion == null) { refLineH.style.display = 'none'; return; }
          updateOverlay();
          refLineH.style.top     = `${proportion * 100}%`;
          refLineH.style.display = 'block';
        } else if (type === 'v') {
          if (!refLineV) return;
          if (proportion == null) { refLineV.style.display = 'none'; return; }
          updateOverlay();
          refLineV.style.left    = `${proportion * 100}%`;
          refLineV.style.display = 'block';
        } else if (type === 'd') {
          if (refLineH) refLineH.style.display = 'none';
          if (!refLineD) return;
          if (proportion == null) { refLineD.setAttribute('display', 'none'); return; }
          updateOverlay();
          const { x1, y1, x2, y2 } = proportion;
          refLineD.setAttribute('x1', `${x1 * 100}%`);
          refLineD.setAttribute('y1', `${y1 * 100}%`);
          refLineD.setAttribute('x2', `${x2 * 100}%`);
          refLineD.setAttribute('y2', `${y2 * 100}%`);
          refLineD.setAttribute('display', '');
        }
      },
      triggerUpdate() { updateReferenceLines(); },
    };
    // Expose jump-to-Z for axial columns (called by sagittal click)
    if (isAx) {
      registration.jumpToZ = function(targetZ) {
        let bestIdx = 0, bestDist = Infinity;
        for (let i = 0; i < images.length; i++) {
          const z = images[i].imagePosition?.[2] ?? images[i].sliceLocation;
          if (z != null && isFinite(z)) {
            const d = Math.abs(z - targetZ);
            if (d < bestDist) { bestDist = d; bestIdx = i; }
          }
        }
        setSlice(bestIdx);
      };
    }
    // Sagittal columns with physical extent get a crosshair cursor (jump-to-disc hint)
    if (isSag && physicalExtent) colEl.classList.add('sag-jumpable');

    if (linkGroupId) {
      if (!mriLinkGroups[linkGroupId]) mriLinkGroups[linkGroupId] = [];
      mriLinkGroups[linkGroupId] = mriLinkGroups[linkGroupId].filter(r => r.colEl !== colEl);
      mriLinkGroups[linkGroupId].push(registration);
    }

    function updateReferenceLines() {
      if (!linkGroupId || images.length <= 1) return;
      const group = mriLinkGroups[linkGroupId];
      if (!group) return;

      const img = images[currentIdx];
      if (!img) return;

      for (const reg of group) {
        if (reg.colEl === colEl) continue;

        if (isSag && reg.isAx && reg.physicalExtent) {
          // Use LPS X coordinate directly — avoids SliceLocation sign ambiguity
          const sagX = img.imagePosition?.[0];
          if (sagX == null || !isFinite(sagX)) continue;
          const { x0, xExtent } = reg.physicalExtent;
          const raw = (sagX - x0) / xExtent;
          const prop = (raw >= 0 && raw <= 1) ? raw : null;
          reg.setReferenceLine('v', prop);
        } else if (isAx && reg.isSag && reg.physicalExtent) {
          const axIpp = img.imagePosition;
          const axIop = img.imageOrientation;   // per-slice — correct for multi-angle series
          if (axIpp && axIop && reg.physicalExtent.iop) {
            // Compute the true intersection of this oblique axial plane with the sagittal image
            const diag = computeObliqueRefLine(axIpp, axIop, reg.physicalExtent);
            reg.setReferenceLine('d', diag);
          } else {
            // Fallback: simple horizontal line at Z position
            const axZ = axIpp?.[2];
            if (axZ == null || !isFinite(axZ)) continue;
            const { z0, zExtent } = reg.physicalExtent;
            const raw = (axZ - z0) / zExtent;
            reg.setReferenceLine('h', (raw >= 0 && raw <= 1) ? raw : null);
          }
        }
      }
    }

    function setSlice(idx) {
      currentIdx = Math.max(0, Math.min(idx, images.length - 1));
      imgEl.src = images[currentIdx].url;
      imgEl.alt = String(currentIdx + 1);
      if (counterEl) counterEl.textContent = `${currentIdx + 1}/${images.length}`;
      pushCastImage(images[currentIdx].url);
      updateReferenceLines();
    }

    const ac  = new AbortController();
    const sig = ac.signal;

    imgEl.addEventListener('click', e => {
      // Sagittal + physical metadata: single click jumps all axial columns to clicked Z
      if (isSag && linkGroupId && physicalExtent) {
        const fRect = frameEl.getBoundingClientRect();
        const iRect = imgEl.getBoundingClientRect();
        const iElH  = iRect.height || 1;
        const natH  = imgEl.naturalHeight > 0 ? imgEl.naturalHeight : (physicalExtent.rows ?? iElH);
        const natW  = imgEl.naturalWidth  > 0 ? imgEl.naturalWidth  : (physicalExtent.cols ?? iElH);
        const sc    = Math.min((iRect.width || 1) / natW, iElH / natH);
        const cH    = natH * sc;
        const topOff = (iRect.top - fRect.top) + (iElH - cH) / 2;
        const yFrac  = Math.max(0, Math.min(1, ((e.clientY - fRect.top) - topOff) / cH));
        const targetZ = physicalExtent.z0 + yFrac * physicalExtent.zExtent;
        const group = mriLinkGroups[linkGroupId];
        if (group) { for (const reg of group) { if (reg.isAx && reg.jumpToZ) reg.jumpToZ(targetZ); } }
        return; // don't open fullscreen on single click
      }
      openFullscreen(images, currentIdx);
    }, { signal: sig });
    // Double-click on sagittal still opens fullscreen
    if (isSag) imgEl.addEventListener('dblclick', () => openFullscreen(images, currentIdx), { signal: sig });

    // Mouse wheel: scroll through slices
    colEl.addEventListener('wheel', e => {
      e.preventDefault();
      if (e.deltaY > 0) setSlice(currentIdx + 1);
      else if (e.deltaY < 0) setSlice(currentIdx - 1);
    }, { passive: false, signal: sig });

    // Touch swipe up/down: scroll through slices
    let touchStartY = 0;
    colEl.addEventListener('touchstart', e => {
      touchStartY = e.touches[0].clientY;
    }, { passive: true, signal: sig });
    colEl.addEventListener('touchend', e => {
      const dy = touchStartY - e.changedTouches[0].clientY;
      if (Math.abs(dy) > 25) setSlice(currentIdx + (dy > 0 ? 1 : -1));
    }, { passive: true, signal: sig });

    // Series swap dropdown
    if (seriesList && seriesList.length > 1 && labelEl && labelTextEl) {
      labelEl.classList.add('has-swap');
      if (!labelEl.querySelector('.mri-swap-arrow')) {
        const arrowSpan = document.createElement('span');
        arrowSpan.className = 'mri-swap-arrow';
        arrowSpan.textContent = '▾';
        labelEl.insertBefore(arrowSpan, counterEl);
      }

      let menuEl = null;

      function closeMenu() {
        if (menuEl) { menuEl.remove(); menuEl = null; }
        document.removeEventListener('click', onOutsideClick);
      }
      function onOutsideClick(e) {
        if (menuEl && !menuEl.contains(e.target) && !labelEl.contains(e.target)) closeMenu();
      }

      labelEl.addEventListener('click', e => {
        e.stopPropagation();
        if (menuEl) { closeMenu(); return; }
        const currentSeriesKey = images[0]?.seriesKey;
        const otherSeries = seriesList.filter(s => s.seriesKey !== currentSeriesKey);
        if (otherSeries.length === 0) return;
        menuEl = document.createElement('ul');
        menuEl.className = 'series-swap-menu';
        for (const s of otherSeries) {
          const li = document.createElement('li');
          li.textContent = s.seriesLabel;
          li.addEventListener('click', ev => {
            ev.stopPropagation();
            closeMenu();
            swapSeriesInColumn(colEl, s, seriesList, linkGroupId);
          });
          menuEl.appendChild(li);
        }
        labelEl.appendChild(menuEl);
        setTimeout(() => document.addEventListener('click', onOutsideClick), 0);
      }, { signal: sig });
    }

    // Store cleanup so next call or swap can tear down listeners + group registration
    colEl._mriCleanup = () => {
      ac.abort();
      if (imgEl) imgEl.removeEventListener('load', updateOverlay);
      if (linkGroupId && mriLinkGroups[linkGroupId]) {
        mriLinkGroups[linkGroupId] = mriLinkGroups[linkGroupId].filter(r => r.colEl !== colEl);
      }
      colEl._mriCleanup = null;
    };

    setSlice(currentIdx);
  }

  function showSingleView() {
    viewMode = 'single';
    document.getElementById('rowView').style.display = 'none';
    document.getElementById('imageContainer').style.display = 'flex';
    document.getElementById('bottomBar').style.display = 'flex';
    document.querySelectorAll('.study-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.nav-overlay').forEach(el => el.style.display = '');
  }

  // ── Region Filter ──
  function setRegionFilter(region) {
    if (viewMode === 'compare') {
      exitCompareMode();
      document.getElementById('compareBtn').classList.remove('active');
    }
    if (viewMode === 'snapshot') {
      exitSnapshotMode();
    }
    activeRegion = region;
    document.querySelectorAll('.filter-btn').forEach(b => {
      if (b.classList.contains('compare-btn') || b.classList.contains('snapshot-btn')) return;
      b.classList.toggle('active', b.dataset.region === region);
    });
    showSingleView();
    currentIndex = 0;
    applyRegionFilter();
    pushCastState(true);
  }

  function studyMatchesRegion(studyDesc, region) {
    if (region === 'all') return true;
    const kws = REGION_KW[region] || [];
    const base = (studyDesc || '').split(' - ')[0].toLowerCase();
    return kws.some(kw => base.includes(kw)) && !isMultiRegionStudy(base);
  }

  function updateStudyBarVisibility() {
    const buttons = document.querySelectorAll('.study-btn');
    buttons.forEach(btn => {
      const key = btn.dataset.studykey;
      const s = allStudies.find(st => st.key === key);
      if (!s) return;
      const visible = studyMatchesRegion(s.description, activeRegion);
      btn.style.display = visible ? '' : 'none';
    });
  }

  function applyRegionFilter() {
    if (activeRegion === 'all') {
      filteredImages = allImages.slice();
    } else {
      const kws = REGION_KW[activeRegion] || [];
      filteredImages = allImages.filter(img => {
        // Only match on the study description BEFORE any " - " series suffix
        const base = (img.study || '').split(' - ')[0].toLowerCase();
        // Must match target region, must NOT also match another region (multi-region → All only)
        return kws.some(kw => base.includes(kw)) && !isMultiRegionStudy(base);
      });
    }

    updateStudyBarVisibility();

    const noResults = document.getElementById('noResults');
    if (filteredImages.length > 0) {
      noResults.style.display = 'none';
      document.getElementById('mainImage').style.display = 'block';
      document.getElementById('bottomBar').style.display = 'flex';
      showImage(0);
      renderThumbs();
    } else {
      document.getElementById('mainImage').style.display = 'none';
      document.getElementById('bottomBar').style.display = 'none';
      setStudyInfo('No studies found', '');
      document.getElementById('imageCounter').textContent = '';
      document.getElementById('thumbStrip').innerHTML = '';
      noResults.style.display = 'flex';
      document.getElementById('noResultsMsg').textContent =
        activeRegion === 'all'
          ? 'No images preloaded for this patient'
          : `No ${activeRegion} spine studies found`;
    }
  }

  // ── Single-image Navigation ──
  function showImage(index) {
    if (!filteredImages.length) return;
    currentIndex = Math.max(0, Math.min(index, filteredImages.length - 1));
    document.getElementById('mainImage').src = filteredImages[currentIndex].url;
    setStudyInfo(
      `${filteredImages[currentIndex].study.split(' - ')[0]}  ·  ${currentIndex + 1} / ${filteredImages.length}`,
      filteredImages[currentIndex].location || ''
    );
    document.getElementById('imageCounter').textContent =
      `${currentIndex + 1} / ${filteredImages.length}`;
    document.querySelectorAll('.thumb').forEach((t, i) => t.classList.toggle('active', i === currentIndex));
    pushCastImage(filteredImages[currentIndex].url);
  }

  function nextImage() { if (currentIndex < filteredImages.length - 1) showImage(currentIndex + 1); }
  function prevImage() { if (currentIndex > 0) showImage(currentIndex - 1); }

  function renderThumbs() {
    document.getElementById('thumbStrip').innerHTML = filteredImages.map((img, i) => `
      <img class="thumb ${i === 0 ? 'active' : ''}" src="${escHtml(img.url)}" alt="${i + 1}"
           onclick="openFullscreen(filteredImages, ${i})">`
    ).join('');
  }

  // ── Fullscreen ──
  function openFullscreen(images, index) {
    fsImages = Array.isArray(images) ? images : filteredImages;
    fsIndex  = index;
    document.getElementById('fsImage').src = fsImages[fsIndex].url || fsImages[fsIndex];
    updateFsCounter();
    document.getElementById('fullscreenOverlay').classList.add('open');
    pushCastImage(fsImages[fsIndex].url || fsImages[fsIndex], true);
  }

  function closeFullscreen() {
    document.getElementById('fullscreenOverlay').classList.remove('open');
  }

  function fsNav(dir) {
    fsIndex = Math.max(0, Math.min(fsIndex + dir, fsImages.length - 1));
    document.getElementById('fsImage').src = fsImages[fsIndex].url || fsImages[fsIndex];
    updateFsCounter();
    pushCastImage(fsImages[fsIndex].url || fsImages[fsIndex], true);
  }

  function updateFsCounter() {
    const img = fsImages[fsIndex];
    const study = img.study ? img.study.split(' - ')[0] : '';
    document.getElementById('fsCounter').textContent =
      `${study ? study + '  ·  ' : ''}${fsIndex + 1} / ${fsImages.length}`;
  }

  // ── Cast ──

  function setCastRoom(room) {
    if (castActiveRoom === room) {
      castActiveRoom = null;
      fetch(`${API}/api/cast/${room}`, { method: 'DELETE' }).catch(() => {});
      document.querySelectorAll('.cast-btn').forEach(b => b.classList.remove('active'));
      return;
    }
    castActiveRoom = room;
    document.querySelectorAll('.cast-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`cast${room.charAt(0).toUpperCase() + room.slice(1)}`).classList.add('active');
    pushCastState(true);
  }

  function buildCastState() {
    if (!snapshotPatientKey) return null;
    const state = {
      patientKey: snapshotPatientKey,
      studyKey:   activeStudyKey || null,
      imgIndex:   currentIndex,
      viewMode,
      region:     activeRegion,
    };
    if (viewMode === 'compare') {
      state.compareTop = compareTopStudyKey;
      state.compareBottom = compareBottomStudyKey;
    }
    return state;
  }

  function pushCastState(immediate = false) {
    const state = buildCastState();
    if (!state || !castActiveRoom) return;
    clearTimeout(castDebounceTimer);
    if (immediate) {
      _doCastPush(state);
    } else {
      castDebounceTimer = setTimeout(() => _doCastPush(state), 300);
    }
  }

  function _doCastPush(state) {
    if (!castActiveRoom || !state) return;
    fetch(`${API}/api/cast/${castActiveRoom}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state),
    }).catch(() => {});
  }

  function pushCastImage(url, immediate = false) {
    if (url) lastVisibleUrl = url;
    pushCastState(immediate);
  }

  async function renameCastRoom(e, room) {
    e.stopPropagation();
    const id = `cast${room.charAt(0).toUpperCase() + room.slice(1)}`;
    const btn = document.getElementById(id);
    const name = prompt('Room name:', btn.textContent);
    if (!name || name === btn.textContent) return;
    try {
      const r = await fetch(`${API}/api/cast/${room}/name`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name }),
      });
      if (r.ok) btn.textContent = name;
    } catch {}
  }

  async function loadRoomNames() {
    for (const room of ['room1', 'room2', 'room3']) {
      try {
        const r = await fetch(`${API}/api/cast/${room}`);
        if (!r.ok) continue;
        const d = await r.json();
        const id = `cast${room.charAt(0).toUpperCase() + room.slice(1)}`;
        const btn = document.getElementById(id);
        if (btn && d.name) btn.textContent = d.name;
      } catch {}
    }
  }

  // ── UI ──
  function toggleSidebar() {
    const sb = document.getElementById('sidebar');
    if (window.innerWidth <= 700) sb.classList.toggle('open');
    else sb.classList.toggle('collapsed');
  }

  function toggleHeader() {
    document.getElementById('viewerHeader').classList.toggle('hidden');
    const bb = document.getElementById('bottomBar');
    if (bb.style.display !== 'none') bb.classList.toggle('hidden');
  }

  // ── Brightness / Contrast ──
  function toggleBC() {
    const bar = document.getElementById('bcBar');
    const open = bar.style.display === 'none';
    bar.style.display = open ? 'flex' : 'none';
    document.getElementById('bcBtn').classList.toggle('active', open);
  }

  function resetBC() {
    document.getElementById('brightnessSlider').value = 100;
    document.getElementById('contrastSlider').value = 100;
    updateBC();
  }

  function updateBC() {
    const b = document.getElementById('brightnessSlider').value / 100;
    const c = document.getElementById('contrastSlider').value / 100;
    document.documentElement.style.setProperty('--img-brightness', b);
    document.documentElement.style.setProperty('--img-contrast', c);
  }

  document.getElementById('brightnessSlider').addEventListener('input', updateBC);
  document.getElementById('contrastSlider').addEventListener('input', updateBC);

  function escHtml(s) {
    const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML;
  }
  function escAttr(s) {
    return (s || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
  }

  // ── Imaging Report ──
  function studyModalityLabel(desc, modality) {
    if (modality) {
      if (/^MRI?$/i.test(modality)) return 'MRI';
      if (/^CT$/i.test(modality)) return 'CT';
    }
    if (/^(MR|MRI)[\s\-]/i.test(desc)) return 'MRI';
    if (/^CT[\s\-]/i.test(desc)) return 'CT';
    return 'XR';
  }

  function isSpineStudy(desc) {
    const base = (desc || '').split(' - ')[0].toLowerCase();
    const allKws = [...(REGION_KW.lumbar || []), ...(REGION_KW.cervical || []), ...(REGION_KW.thoracic || [])];
    return allKws.some(kw => base.includes(kw));
  }

  async function openDateReport(dk) {
    const label = dk ? formatClinicDate(dk) : 'Unscheduled';
    document.getElementById('reportTitle').textContent = `Imaging Report — ${label}`;
    document.getElementById('reportBody').innerHTML = '<div class="report-loading">Loading…</div>';
    document.getElementById('reportCopyBtn').textContent = 'Copy';
    document.getElementById('reportCopyBtn').classList.remove('copied');
    document.getElementById('reportOverlay').style.display = 'flex';

    const patients = patientsByDate[dk] || [];

    // Fetch full study details for all patients in parallel
    const results = await Promise.all(patients.map(async p => {
      try {
        const resp = await fetch(`${API}/api/patients/${encodeURIComponent(p.key)}`);
        const data = await resp.json();
        return { p, studies: data.studies };
      } catch (e) { return { p, studies: null }; }
    }));

    let html = '';
    for (const { p, studies } of results) {
      html += `<div class="report-patient-block">
        <div class="report-patient-name">${escHtml(p.name)}</div>
        <div class="report-patient-dob">DOB: ${escHtml(p.dob)}</div>`;

      if (!studies) {
        html += `<div class="report-no-studies">Error loading studies</div>`;
      } else {
        const studyList = Object.values(studies)
          .filter(s => isSpineStudy(s.description || ''))
          .sort((a, b) => (b.date || '').localeCompare(a.date || ''));

        if (studyList.length === 0) {
          html += `<div class="report-no-studies">No spine studies loaded</div>`;
        } else {
          for (const s of studyList) {
            const mod = studyModalityLabel(s.description || '', s.modality || '');
            const modClass = mod.toLowerCase();
            const dateStr = s.date ? formatStudyDate(s.date) : '—';
            const imgCount = (s.images || []).length;
            html += `<div class="report-study-row">
              <span class="report-modality ${modClass}">${mod}</span>
              <span class="report-study-desc">${escHtml(s.description || 'Unknown')}</span>
              <span class="report-study-meta">${imgCount} img · ${escHtml(dateStr)}</span>
            </div>`;
          }
        }
      }
      html += `</div>`;
    }
    document.getElementById('reportBody').innerHTML = html || '<div class="report-loading">No patients</div>';
  }

  function closeReport() {
    document.getElementById('reportOverlay').style.display = 'none';
  }

  function copyReport() {
    const body = document.getElementById('reportBody');
    const title = document.getElementById('reportTitle').textContent;
    // Build plain-text version
    let lines = [title, ''];
    body.querySelectorAll('.report-patient-block').forEach(block => {
      lines.push(block.querySelector('.report-patient-name')?.textContent || '');
      lines.push(block.querySelector('.report-patient-dob')?.textContent || '');
      block.querySelectorAll('.report-study-row').forEach(row => {
        const mod  = row.querySelector('.report-modality')?.textContent || '';
        const desc = row.querySelector('.report-study-desc')?.textContent || '';
        const meta = row.querySelector('.report-study-meta')?.textContent || '';
        lines.push(`  [${mod}] ${desc}  ${meta}`);
      });
      const noStudies = block.querySelector('.report-no-studies');
      if (noStudies) lines.push(`  ${noStudies.textContent}`);
      lines.push('');
    });
    navigator.clipboard.writeText(lines.join('\n')).then(() => {
      const btn = document.getElementById('reportCopyBtn');
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    }).catch(() => {});
  }

  // ── Auto-refresh ──
  loadPatients().then(() => {
    if (_castPatient) selectPatient(decodeURIComponent(_castPatient));
  });
  setInterval(loadPatients, 5000);
  if (!_displayMode) loadRoomNames();
</script>
</body>
</html>
